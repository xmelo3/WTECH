<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header>

    <div class="logo">
        <img src="images/logo.svg" alt="Logo">
    </div>

    <div class="search">
        <input type="text" placeholder="Search">
        <button>🔍</button>
    </div>

    <nav class="icons">
        <a href="#"><img src="images/profile.svg" alt=""></a>
        <a href="#"><img src="images/cart.svg" alt=""></a>
        <a href="index.html"><img src="images/home.svg" alt=""></a>
    </nav>

</header>


<!-- ===== CATEGORY BAR ===== -->
<nav class="main-nav">
    <button>Category</button>
    <button>Category</button>
    <button>Category</button>
    <button>Category</button>
</nav>


<!-- ===== PROFILE ===== -->
<section class="profile">

    <div class="avatar"></div>

    <div class="bio">
        <h2>Bio</h2>
        <p>This is user bio description.</p>
    </div>

</section>


<!-- ===== STATS + SEARCH ===== -->
<section class="profile-bar">

    <div class="profile-stats">
        Likes: 12 &nbsp; Followers: 1234 &nbsp; Following: 234
    </div>

    <div class="profile-search">
        <input type="text" placeholder="Search posts">
    </div>

</section>


<!-- ===== POSTS GRID ===== -->
<section class="profile-posts">

    <div class="post"></div>
    <div class="post"></div>
    <div class="post"></div>
    <div class="post"></div>

    <div class="post"></div>
    <div class="post"></div>
    <div class="post"></div>
    <div class="post"></div>

</section>


<!-- ===== FOOTER ===== -->
<footer>

    <div class="logo-footer">
        <img src="images/logo.png" alt="Logo">
    </div>

    <div class="footer-links">
        <div>About Us</div>
        <div>Contact</div>
    </div>

</footer>

</body>
</html>
