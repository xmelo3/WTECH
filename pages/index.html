<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<iframe src="./components/header.html"
        class="header-frame"
        title="Site header"
        scrolling="no">
</iframe>

<!-- ===== MAIN ===== -->
<main>

    <!-- HERO -->
    <section class="hero">
        <picture>
            <source media="(max-width: 480px)" srcset="../images/hero-330w.png">

        </picture>
    </section>

    <!-- FEATURED -->
    <section class="featured">
        <h2>Featured models</h2>
        <div class="scroll-wrapper">
            <div class="scroll-container">

                <div class="item">
                    <img src="../images/st5.webp" alt="Charizard">

                    </div>
                </div>

                <div class="item">
                    <img src="../images/st6.webp" alt="Border Collie">
                    <div class="overlay">
                        <h4>Border Collie</h4>
                        <p>$39</p>

                    </div>
                </div>

                <div class="item">
                    <img src="../images/st9.webp" alt="Banana">
                    <div class="overlay">
                        <h4>Banana</h4>
                        <p>$24</p>
                        <a href="detail.html" class="overlay-btn">Buy now</a>

                </div>

                <div class="item">
                    <img src="../images/st14.webp" alt="Toothless">
                    <div class="overlay">
                        <h4>Toothless</h4>
                        <p>$59</p>
                        <a href="detail.html" class="overlay-btn">Buy now</a>
                    </div>
                </div>

                <div class="item">
                    <img src="../images/st15.webp" alt="Surikata">
                    <div class="overlay">
                        <h4>Surikata</h4>
                        <p>$49</p>
                        <a href="detail.html" class="overlay-btn">Buy now</a>
                    </div>
                </div>

                <div class="item">
                    <img src="../images/st16.webp" alt="Doge">
                    <div class="overlay">
                        <h4>Doge</h4>
                        <p>$59</p>
                        <a href="detail.html" class="overlay-btn">Buy now</a>
                    </div>
                </div>

                <div class="item">
                    <img src="../images/st18.webp" alt="Pinguin">
                    <div class="overlay">
                        <h4>Pinguin</h4>
                        <p>$39</p>
                        <a href="detail.html" class="overlay-btn">Buy now</a>
                    </div>
                </div>

                <div class="item">
                    <img src="../images/st20.webp" alt="Dragon Skull">
                    <div class="overlay">
                        <h4>Dragon Skull</h4>
                        <p>$55</p>
                        <a href="detail.html" class="overlay-btn">Buy now</a>
                    </div>
                </div>

            </div>
        </div>
        <a href="store.html" class="see-more">See More</a>
    </section>

</main>

<!-- ===== FOOTER ===== -->
<iframe src="./components/footer.html"
        class="footer-frame"
        title="Site footer"
        scrolling="no">
</iframe>

</body>
</html>
