<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <a href="index.html" class="logo">
        <img src="../images/logo.svg" alt="Logo">
    </a>

    <div class="search">
        <input type="text" placeholder="Search...">
        <button>
            <img src="../images/search.svg" alt="Search">
        </button>
    </div>

    <!-- NEW WRAPPER -->
    <div class="header-right">
        <div class="login-register">
            <a href="login.html" class="nav-btn">Login</a>
            <a href="register.html" class="nav-btn">Register</a>
        </div>

        <nav class="icons">
            <a href="index.html">
                <img src="../images/home.svg" alt="Home">
            </a>
            <a href="cart.html">
                <img src="../images/cart.svg" alt="Cart">
            </a>
            <a href="profile.html">
                <img src="../images/profile.svg" alt="Profile">
            </a>
        </nav>
    </div>
</header>

<!-- ===== MAIN NAVIGATION ===== -->
<nav class="main-nav">
    <a href="#" class="nav-btn">Community</a>
    <a href="#" class="nav-btn">Status</a>
    <a href="store.html" class="nav-btn">Store</a>
</nav>


<!-- ===== HERO SECTION ===== -->
<section class="hero">
    <picture>
        <source media="(max-width: 480px)" srcset="../images/hero-330w.png">
        <img src="../images/hero-600w.png" alt="Hero banner">
    </picture>
</section>

<!-- ===== FEATURED SECTION ===== -->
<section class="featured">
    <h2>Featured models</h2>
    <div class="scroll-wrapper">
        <div class="scroll-container">
            <div class="item"><img src="../images/items/featured1.png" alt="House"></div>
            <div class="item"><img src="../images/items/featured2.png" alt="Headphones"></div>
            <div class="item"><img src="../images/items/featured3.png" alt="F1 car"></div>
            <div class="item"><img src="../images/items/featured4.png" alt="Asian coridor"></div>
            <div class="item"><img src="../images/items/featured5.png" alt="Well"></div>
            <div class="item"><img src="../images/items/featured6.png" alt="Lighthouse"></div>
            <div class="item"><img src="../images/items/featured7.png" alt="Witch hut"></div>
            <div class="item"><img src="../images/items/featured8.png" alt="Skateboard"></div>
        </div>
    </div>
    <a href="store.html">
        <button class="see-more">See More</button>
    </a>
</section>

<!-- ===== FOOTER ===== -->
<footer>
    <div class="logo-footer">
        <img src="../images/logo.svg" alt="Logo">
    </div>

    <div class="footer-links">
        <div>
            <h4>About</h4>
            <p>Info about project</p>
        </div>
        <div>
            <h4>Contact</h4>
            <p>Email: contact@gmail.com</p>
        </div>
    </div>
</footer>

</body>
</html>
