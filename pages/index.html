<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <a href="index.html" class="logo">
        <img src="../images/logo.svg" alt="WTECH Logo">
    </a>

    <div class="search">
        <input type="text" placeholder="Search...">
        <button><img src="../images/search.svg" alt="Search"></button>
    </div>

    <nav class="icons">
        <a href="index.html" class="icon">
            <img src="../images/home.svg" alt="Home"> 
        </a>
        <a href="cart.html" class="icon">
            <img src="../images/cart.svg" alt="Cart"> 
        </a>
        <a href="profile.html" class="icon">
            <img src="../images/profile.svg" alt="Profile"> 
        </a>
    </nav>
</header>

<!-- ===== MAIN NAVIGATION ===== -->
<nav class="main-nav">
    <button>Community</button>
    <button>Status</button>
    <button><a href=store.html>Store</a></button>
</nav>


<!-- ===== HERO SECTION ===== -->
<section class="hero">
    <picture>
        <source media="(max-width: 480px)" srcset="../images/hero-330w.png">
        <img src="../images/hero-600w.png" alt="Hero banner">
    </picture>
</section>

<!-- ===== FEATURED SECTION ===== -->
<section class="featured">
    <h2>Featured</h2>
    <div class="scroll-container">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
        <div class="item">Item 5</div>
        <div class="item">Item 6</div>
        <div class="item">Item 7</div>
        <div class="item">Item 8</div>
    </div>
    <button class="see-more">See More</button>
</section>

<!-- ===== FOOTER ===== -->
<footer>
    <div class="logo-footer">
        <img src="../images/logo.svg" alt="Logo">
    </div>

    <section class="footer-links">
        <div class="about">
            <h4>About Us</h4>
            <p>Info</p>
        </div>
        <div class="contact">
            <h4>Contact</h4>
            <p>Email: contact@gmail.com</p>
            <p>Phone: +123456789</p>
        </div>
    </section>
</footer>

</body>
</html>
