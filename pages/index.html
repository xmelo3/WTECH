<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <div class="logo">
        <img src="images/logo.png" alt="Logo">
    </div>

    <div class="search">
        <input type="text" placeholder="Search...">
        <button>🔍</button>
    </div>

    <nav class="icons">
        <a href="index.html" class="icon">Home</a>
        <a href="#" class="icon">Cart</a>
        <a href="profile.html" class="icon">Profile</a>
    </nav>
</header>

<!-- ===== MAIN NAVIGATION ===== -->
<nav class="main-nav">
    <button>Community</button>
    <button>Status</button>
    <button><a href=store.html>Store</a></button>
</nav>

<!-- ===== HERO SECTION ===== -->
<section class="hero">
    <h1>Welcome to WTECH</h1>
    <p>Discover the latest products and community updates.</p>
</section>

<!-- ===== FEATURED SECTION ===== -->
<section class="featured">
    <h2>Featured</h2>
    <div class="scroll-container">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
        <div class="item">Item 5</div>
    </div>
    <button class="see-more">See More</button>
</section>

<!-- ===== FOOTER ===== -->
<footer>
    <div class="logo-footer">
        <img src="images/logo.png" alt="Logo">
    </div>
    <div class="footer-links">
        <div class="about">
            <h4>About Us</h4>
            <p>Some info about WTECH.</p>
        </div>
        <div class="contact">
            <h4>Contact</h4>
            <p>Email: contact@wtech.com</p>
            <p>Phone: +123456789</p>
        </div>
    </div>
</footer>

</body>
</html>
