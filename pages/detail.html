<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail</title>
    <link rel="stylesheet" href="../css/style.css">

</head>
<body>
<header>
    <div class="logo">
        <img src="imges/logo.png" alt="Logo">
    </div>

    <div class="search">
        <input type="text" placeholder="Search...">
        <button>🔍</button>
    </div>

    <nav class="icons">
        <a href="index.html" class="icon">🏠</a>
        <a href="#" class="icon">🛒</a>
        <a href="profile.html" class="icon">👤</a> <!-- Profile -->
    </nav>
</header>

<nav class="main-nav">
    <button>Community</button>
    <button>Status</button>
    <button>Store</button>
</nav>

<main class="detail-container">

  <!-- ===== PRODUCT IMAGES ===== -->
  <section class="product-images">
    <div class="main-image">
      <img src="../images/model-main.png" alt="3D Model Main">
    </div>
    <div class="thumbnail-images">
      <img src="../images/model1.png" alt="Thumbnail 1">
      <img src="../images/model2.png" alt="Thumbnail 2">
      <img src="../images/model3.png" alt="Thumbnail 3">
    </div>
  </section>

  <!-- ===== PRODUCT INFO ===== -->
    <aside class="product-info">
        <h1>3D Model Name</h1>

        <div class="creator">
            <img src="../images/author.png" alt="Author" class="author-avatar">
            <p class="author-name">Created by <a href="#">Author Name</a></p>
        </div>

        <p class="price">Price: $19.99</p>

        <!-- ===== ACTION BUTTONS ===== -->
        <div class="actions">
            <button class="download">Download</button>
            <button class="cart">🛒 Add to Cart</button>
            <button class="like">❤️ Like</button>
            <button class="share">🔗 Share</button>
            <button class="bookmark">🔖 Bookmark</button>
        </div>

        <p class="description">
            This is a detailed description of the 3D model. Includes format, polycount, textures, and any other info a buyer needs.
        </p>
    </aside>

</main>

<footer>
    <div class="logo-footer">
        <img src="images/logo.png" alt="Logo">
    </div>
    <div class="footer-links">
        <div class="about">
            <h4>About Us</h4>
            <p>Some info about WTECH.</p>
        </div>
        <div class="contact">
            <h4>Contact</h4>
            <p>Email: contact@wtech.com</p>
            <p>Phone: +123456789</p>
        </div>
    </div>
</footer>

</body>
</html>
