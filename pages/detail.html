<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/detail.css">

</head>
<body>
<header>
    <a href="index.html" class="logo">
        <img src="../images/logo.svg" alt="Logo">
    </a>

    <div class="search">
        <input type="text" placeholder="Search...">
        <button>
            <img src="../images/search.svg" alt="Search">
        </button>
    </div>

    <nav class="icons">
        <a href="index.html">
            <img src="../images/home.svg" alt="Home">
        </a>
        <a href="cart.html">
            <img src="../images/cart.svg" alt="Cart">
        </a>
        <a href="profile.html">
            <img src="../images/profile.svg" alt="Profile">
        </a>
    </nav>
</header>

<main class="detail-container">

  <!-- LEFT: IMAGES -->
  <section class="product-gallery">
    <div class="main-image">
      <img src="../images/detail-main.webp" alt="Main">
    </div>

    <div class="thumbnail-row">
      <img src="../images/detail1.webp" alt="">
      <img src="../images/detail2.webp" alt="">
      <img src="../images/detail3.webp" alt="">
      <img src="../images/detail4.webp" alt="">
    </div>
  </section>

  <!-- RIGHT: PRODUCT INFO -->
  <aside class="product-sidebar">

    <div class="product-header">
      <h1>Fox puzzle</h1>
      <p class="rating">**** (120 reviews)</p>
    </div>

    <div class="author-box">
      <img src="../images/profile.svg" alt="">
      <span>Author Name</span>
      <button class="follow-btn">Follow</button>
    </div>

    <div class="price-box">
      <p class="price">Price: $4.99</p>
    </div>

    <div class="download-box">
      <button class="download-btn">
        <img src="../images/download.svg" alt="">
        Download
      </button>
    </div>

    <div class="icon-actions">
      <button><img src="../images/cart.svg" alt=""></button>
      <button><img src="../images/like.svg" alt=""></button>
      <button><img src="../images/share.svg" alt=""></button>
      <button><img src="../images/bookmark.svg" alt=""></button>
    </div>

  </aside>

  <!-- BOTTOM: DESCRIPTION -->
  <section class="product-description">
    <div class="tabs">
      <button class="tab active">Description</button>
      <button class="tab">Details</button>
      <button class="tab">Reviews</button>
    </div>

    <div class="tab-content">
      <p>
        Detailed description of the model. Includes formats, textures, polycount and more.
      </p>
    </div>
  </section>

</main>

<footer>
    <div class="logo-footer">
        <img src="../images/logo.svg" alt="Logo">
    </div>

    <div class="footer-links">
        <div>
            <h4>About</h4>
            <p>Info about project</p>
        </div>
        <div>
            <h4>Contact</h4>
            <p>Email: contact@gmail.com</p>
        </div>
    </div>
</footer>
</body>
