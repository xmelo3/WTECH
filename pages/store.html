<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/store.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <a href="index.html" class="logo">
        <img src="../images/logo.svg" alt="Logo">
    </a>
    <div class="search">
        <input type="text" placeholder="Search...">
        <button><img src="../images/search.svg" alt="Search"></button>
    </div>
    <div class="header-right">
        <div class="login-register">
            <a href="login.html" class="nav-btn">Login</a>
            <a href="register.html" class="nav-btn">Register</a>
        </div>
        <nav class="icons">
            <a href="index.html"><img src="../images/home.svg"></a>
            <a href="cart.html"><img src="../images/cart.svg"></a>
            <a href="profile.html"><img src="../images/profile.svg"></a>
        </nav>
    </div>
</header>

<!-- ===== NAV ===== -->
<nav class="main-nav">
    <a href="#" class="nav-btn">Community</a>
    <a href="#" class="nav-btn">Status</a>
    <a href="store.html" class="nav-btn">Store</a>
</nav>

<!-- ===== STORE ===== -->
<main class="store-page">

    <aside class="filters">
        <h3>Categories</h3>
        <div class="filter-group">
            <label><input type="checkbox"> Vehicles</label>
            <label><input type="checkbox"> Architecture</label>
            <label><input type="checkbox"> Electronics</label>
            <label><input type="checkbox"> Nature</label>
        </div>

        <h3>Price</h3>
        <div class="filter-group">
            <label><input type="radio" name="price"> Free</label>
            <label><input type="radio" name="price"> Under $10</label>
            <label><input type="radio" name="price"> $10 - $50</label>
            <label><input type="radio" name="price"> $50+</label>
        </div>

        <h3>Advanced</h3>
        <div class="filter-group">
            <label><input type="checkbox"> Animated</label>
            <label><input type="checkbox"> Textured</label>
            <label><input type="checkbox"> Rigged</label>
        </div>

        <button class="apply-btn">Apply Filters</button>
    </aside>

    <section class="products">
        <div class="store-top">
            <h2>All Products</h2>
            <select>
                <option>Sort by</option>
                <option>Price (low → high)</option>
                <option>Price (high → low)</option>
                <option>Newest</option>
            </select>
        </div>

        <div class="product-grid" id="productGrid"></div>

        <!-- ✅ Pagination moved inside .products so it stays in the content column -->
        <div class="pagination">
            <button class="page-btn">Prev</button>
            <button class="page-number active">1</button>
            <button class="page-number">2</button>
            <button class="page-number">3</button>
            <button class="page-number">4</button>
            <button class="page-btn">Next</button>
        </div>
    </section>

</main>

<!-- ===== FOOTER ===== -->
<footer>
    <div class="logo-footer">
        <img src="../images/logo.svg">
    </div>
    <div class="footer-links">
        <div>
            <h4>About</h4>
            <p>Info about project</p>
        </div>
        <div>
            <h4>Contact</h4>
            <p>Email: contact@gmail.com</p>
        </div>
    </div>
</footer>

<!-- ✅ Script at the bottom — DOM exists by the time this runs -->
<script>
const products = [
    { name: "Animals", price: 12 },
    { name: "Deer", price: 18 },
    { name: "Fighter Jet", price: 9 },
    { name: "Army", price: 22 },
    { name: "Charizard", price: 15 },
    { name: "Border Collie", price: 30 },
    { name: "Catan Wheat", price: 8 },
    { name: "These Nuts", price: 11 },
    { name: "Banana", price: 40 },
    { name: "Citrus", price: 19 },
    { name: "Broccoli Head", price: 13 },
    { name: "Chihuahua", price: 21 },
    { name: "Go Eat Him", price: 17 },
    { name: "Dragon", price: 25 },
    { name: "Surikata", price: 6 },
    { name: "Doge Coin", price: 14 },
    { name: "Fancy Dog", price: 32 },
    { name: "Linus", price: 27 },
    { name: "Guard Dog", price: 10 },
    { name: "Skull", price: 45 }
];

const grid = document.getElementById("productGrid");

products.forEach((product, i) => {
    const card = document.createElement("div");
    card.className = "product-card";
    card.innerHTML = `
    <a href="detail.html">
        <img src="../images/st${i+1}.webp" alt="${product.name}">
    </a>
    <h4>${product.name}</h4>
    <p>$${product.price}</p>
    <div class="card-actions">
        <button class="action-btn"><img src="../images/cart.svg"></button>
        <button class="action-btn"><img src="../images/share.svg"></button>
        <button class="action-btn favorite"><img src="../images/heart_empty.svg"></button>
    </div>
    `;
    grid.appendChild(card);
});
</script>

</body>
</html>
