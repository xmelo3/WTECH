<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/store.css">
</head>
<body>

<iframe src="./components/header.html"
        class="header-frame"
        title="Site header"
        scrolling="no">
</iframe>

<main class="store-page">

    <aside class="filters">
        <h3>Categories</h3>
        <div class="filter-group">
            <label><input type="checkbox"> Vehicles</label>
            <label><input type="checkbox"> Architecture</label>
            <label><input type="checkbox"> Electronics</label>
            <label><input type="checkbox"> Nature</label>
        </div>

        <h3>Price</h3>
        <div class="filter-group">
            <label><input type="radio" name="price"> Free</label>
            <label><input type="radio" name="price"> Under $10</label>
            <label><input type="radio" name="price"> $10 - $50</label>
            <label><input type="radio" name="price"> $50+</label>
        </div>

        <h3>Advanced</h3>
        <div class="filter-group">
            <label><input type="checkbox"> Animated</label>
            <label><input type="checkbox"> Textured</label>
            <label><input type="checkbox"> Rigged</label>
        </div>

        <button class="apply-btn">Apply Filters</button>
    </aside>

    <section class="products">
        <div class="store-top">
            <h2>All Products</h2>
            <select>
                <option>Sort by</option>
                <option>Price (low → high)</option>
                <option>Price (high → low)</option>
                <option>Newest</option>
            </select>
        </div>

        <div class="product-grid" id="productGrid"></div>

        <div class="pagination">
            <button class="page-btn">Prev</button>
            <button class="page-number active">1</button>
            <button class="page-number">2</button>
            <button class="page-number">3</button>
            <button class="page-number">4</button>
            <button class="page-btn">Next</button>
        </div>
    </section>

</main>

<div class="footer-wrap">
    <iframe src="/components/footer.html"
            class="footer-frame"
            title="Site footer"
            scrolling="no">
    </iframe>
</div>

<script>
const products = [
    { name: "Animals",      price: 12 },
    { name: "Deer",         price: 18 },
    { name: "Fighter Jet",  price: 9  },
    { name: "Army",         price: 22 },
    { name: "Charizard",    price: 15 },
    { name: "Border Collie",price: 30 },
    { name: "Catan Wheat",  price: 8  },
    { name: "These Nuts",   price: 11 },
    { name: "Banana",       price: 40 },
    { name: "Citrus",       price: 19 },
    { name: "Broccoli Head",price: 13 },
    { name: "Chihuahua",    price: 21 },
    { name: "Go Eat Him",   price: 17 },
    { name: "Dragon",       price: 25 },
    { name: "Surikata",     price: 6  },
    { name: "Doge Coin",    price: 14 },
    { name: "Fancy Dog",    price: 32 },
    { name: "Linus",        price: 27 },
    { name: "Guard Dog",    price: 10 },
    { name: "Skull",        price: 45 }
];

const grid = document.getElementById("productGrid");

products.forEach((product, i) => {
    const card = document.createElement("div");
    card.className = "product-card";
    card.innerHTML = `
        <a href="./detail.html">
            <img src="/images/st${i + 1}.webp" alt="${product.name}">
        </a>
        <h4>${product.name}</h4>
        <p>$${product.price}</p>
        <div class="card-actions">
            <button class="action-btn" aria-label="Add to cart">
                <img src="/images/cart.svg" alt="">
            </button>
            <button class="action-btn" aria-label="Share">
                <img src="/images/share.svg" alt="">
            </button>
            <button class="action-btn favorite" aria-label="Add to favourites">
                <img src="/images/heart_full.svg" alt="">
            </button>
        </div>
    `;
    grid.appendChild(card);
});
</script>

</body>
</html>
