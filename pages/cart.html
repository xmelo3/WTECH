<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cart.css">
</head>
<body>

<iframe src="./components/header.html"
        class="header-frame"
        title="Site header"
        scrolling="no">
</iframe>


<main class="cart-page">

  <div class="back-button">
    <button onclick="location.href='index.html'">← Back</button>
  </div>

  <div class="breadcrumbs">
    <a href="cart.html">Cart</a>
  </div>

  <div class="cart-container">

    <!-- Cart Items -->
    <div class="products-in-cart">

      <div class="product-cart">
        <img src="../images/items/featured6.png" alt="Product">
        <div class="product-info">
          <h4>Lighthouse</h4>
          <p>Lighthouse model made in blender, detailed terain</p>
        </div>
        <div class="product-meta">
          <p>1 × 24€</p>
        </div>
      </div>

      <div class="product-cart">
        <img src="../images/items/featured3.png" alt="F1 car">
        <div class="product-info">
          <h4>F1 car</h4>
          <p>Model of F1 Mercedes 2018 car.</p>
        </div>
        <div class="product-meta">
          <p>2 × 59€</p>
        </div>
      </div>

    </div>

    <!-- Summary -->
    <div class="summary">
      <h2>Summary</h2>
      <hr>
      <ul class="summary-items">
        <li>Lighthouse × 1 → 24€</li>
        <li>F1 car × 2 → 118€</li>
      </ul>
      <hr>
      <p class="total-price">Total price: 142€</p>
      <button class="checkout-btn" onclick="location.href='checkout.html'">Proceed to Checkout</button>
    </div>

  </div>

</main>

<iframe src="./components/footer.html"
        class="footer-frame"
        title="Site footer"
        scrolling="no">
</iframe>

</body>
</html>
