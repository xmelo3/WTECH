<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header>
    <div class="logo">
        <img src="images/logo.png" alt="Logo">
    </div>

    <div class="search">
        <input type="text" placeholder="Search...">
        <button>🔍</button>
    </div>

    <nav class="icons">
        <a href="index.html" class="icon">🏠</a> <!-- Home -->
        <a href="#" class="icon">🛒</a> <!-- Cart -->
        <a href="profile.html" class="icon">👤</a> <!-- Profile -->
    </nav>
</header>

<!-- ===== MAIN NAVIGATION ===== -->
<nav class="main-nav">
    <button>Community</button>
    <button>Status</button>
    <button>Store</button>
    <!-- Add more buttons if needed -->
</nav>

<main class="profile-container">

    <!-- ===== PROFILE INFO ===== -->
    <section class="profile">
        <div class="profile-img">
            <img src="images/profile.png" alt="Profile image">
        </div>

        <div class="bio">
            <h2>BIO</h2>
            <p>This is a short bio about the user. Here you can add info, links, or anything relevant.</p>
        </div>
    </section>

    <!-- ===== STATS + SEARCH ===== -->
    <section class="profile-bar">
        <div class="stats">
            <p>Likes: 120 &nbsp; Followers: 450 &nbsp; Following: 180</p>
        </div>

        <div class="search">
            <input type="text" placeholder="Search...">
            <button>🔍</button>
        </div>
    </section>

    <!-- ===== USER'S PUBLISHED PRODUCTS ===== -->
    <section class="products-published">
        <h2>Published 3D Models</h2>

        <div class="products-grid">
            <!-- Example product card -->
            <div class="product-card">
                <img src="images/model1.png" alt="Model 1">
                <h4>Model 1</h4>
            </div>

            <div class="product-card">
                <img src="images/model2.png" alt="Model 2">
                <h4>Model 2</h4>
            </div>

            <!-- Add more product cards -->
        </div>
    </section>

</main>

<!-- ===== FOOTER ===== -->
<footer>
    <div class="logo-footer">
        <img src="images/logo.png" alt="Logo">
    </div>
    <div class="footer-links">
        <div class="about">
            <h4>About Us</h4>
            <p>Some info about WTECH.</p>
        </div>
        <div class="contact">
            <h4>Contact</h4>
            <p>Email: contact@wtech.com</p>
            <p>Phone: +123456789</p>
        </div>
    </div>
</footer>

</body>
</html>
