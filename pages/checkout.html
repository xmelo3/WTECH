<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cart.css">
</head>
<body>

<iframe src="./components/header.html"
        class="header-frame"
        title="Site header"
        scrolling="no">
</iframe>


<main class="cart-page">

<div class="back-button">
    <button onclick="location.href='cart.html'">← Back</button>
</div>

<div class="breadcrumbs">
    <a href="cart.html">Cart</a>
    <span>→</span>
    <span class="current">Checkout</span>
</div>

<div class="cart-container">
    <div class="products-in-cart">
        <div class="form">
            <h2>Shipping</h2>
            <div class="shipping-methods">
                <label class="shipping-option">
                    <input type="radio" name="shipping" checked>
                    <div class="shipping-card">
                        <h4>AlzaBox</h4>
                        <p>Pickup point</p>
                        <span>€2.99</span>
                    </div>
                </label>

                <label class="shipping-option">
                    <input type="radio" name="shipping">
                    <div class="shipping-card">
                        <h4>Courier</h4>
                        <p>Delivery to address</p>
                        <span>€2.99</span>
                    </div>
                </label>

            </div>

            <h2>Information</h2>
            <!-- Row 1: Name + Surname -->
            <div class="form-row">
                <input type="text" placeholder="Name">
                <input type="text" placeholder="Surname">
            </div>
            
            <div class="form-row">
                <input type="text" placeholder="Email">
            </div>
            <!-- Row 2: City + Postal code -->
            <div class="form-row">
                <input type="text" placeholder="City">
                <input type="text" placeholder="Postal code" class="postal-code">
            </div>

            <!-- Row 3: Address -->
            <div class="form-row">
                <input type="text" placeholder="Address" class="address">
            </div>

            <div class="form-row">
                <input type="text" placeholder="Phone Number">
            </div>
        </div>
    </div>

    <div class="summary">
      <h2>Summary</h2>
      <hr>
      <ul class="summary-items">
        <li>Lighthouse × 1 → 24€</li>
        <li>F1 car × 2 → 118€</li>
        <li>Shipping → 2.99€</li>
      </ul>
      <hr>
      <p class="total-price">Total price: 144.99€</p>
      <button class="checkout-btn" onclick="location.href='payment.html'">Proceed to payment</button>
    </div>

</div>  

</main>

<iframe src="./components/footer.html"
        class="footer-frame"
        title="Site footer"
        scrolling="no">
</iframe>

</body>
</html>
