<svg xmlns="http://www.w3.org/2000/svg" width="112" height="122" viewBox="0 0 112 122">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="112" height="112" rx="24" fill="#4E342E" filter="url(#shadow)" style="fill:rgb(78, 52, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="14" y="18" width="84" height="10" rx="5" fill="#C8A27A" style="fill:rgb(200, 162, 122);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="14" y="84" width="84" height="10" rx="5" fill="#D7B899" style="fill:rgb(215, 184, 153);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Vertical center between bars: top bar bottom=28, bottom bar top=84, center=56 -->
  <text font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#F5E6D3" text-anchor="middle" dominant-baseline="central" style="fill:rgb(245, 230, 211);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, Helvetica, sans-serif;font-size:16px;font-weight:700;text-anchor:middle;dominant-baseline:central">
    <tspan font-size="44" x="36" y="56" style="fill:rgb(245, 230, 211);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, Helvetica, sans-serif;font-size:44px;font-weight:700;text-anchor:middle;dominant-baseline:central">P</tspan>
    <tspan font-size="27" x="56" y="58" style="fill:rgb(245, 230, 211);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, Helvetica, sans-serif;font-size:27px;font-weight:700;text-anchor:middle;dominant-baseline:central">4</tspan>
    <tspan font-size="44" x="76" y="56" style="fill:rgb(245, 230, 211);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, Helvetica, sans-serif;font-size:44px;font-weight:700;text-anchor:middle;dominant-baseline:central">U</tspan>
  </text>
</svg>